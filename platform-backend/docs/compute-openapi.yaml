openapi: 3.1.0
info:
  title: Fractal Compute private v1 API
  version: 1.0.0
  description: |
    Authoritative Platform Worker contract for the current C++ Compute v1 server.
    Legacy /api/* routes are explicitly outside this contract.
servers:
  - url: http://compute.internal
security:
  - ComputeServiceKey: []
paths:
  /compute/v1/previews:
    post:
      operationId: renderMapPreview
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PreviewRequest' }
      responses:
        '200':
          description: RGBA8 preview frame
          headers:
            X-FSD-Width: { schema: { type: integer } }
            X-FSD-Height: { schema: { type: integer } }
            X-FSD-Pixel-Format: { schema: { type: string, const: rgba8 } }
          content:
            application/octet-stream: { schema: { type: string, format: binary } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /compute/v1/runs:
    post:
      operationId: createRun
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRunRequest' }
      responses:
        '202':
          description: Created or idempotently reused Compute run
          content:
            application/json: { schema: { $ref: '#/components/schemas/RunEnvelope' } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /compute/v1/runs/{computeRunId}:
    get:
      operationId: getRun
      parameters:
        - $ref: '#/components/parameters/ComputeRunId'
      responses:
        '200':
          description: Current run state; HTTP success does not mean render success
          content:
            application/json: { schema: { $ref: '#/components/schemas/RunEnvelope' } }
        '401': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /compute/v1/runs/{computeRunId}/cancel:
    post:
      operationId: cancelRun
      parameters:
        - $ref: '#/components/parameters/ComputeRunId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: false }
      responses:
        '202':
          description: Cancellation intent accepted; caller continues polling
          content:
            application/json: { schema: { $ref: '#/components/schemas/RunEnvelope' } }
        '401': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /compute/v1/runs/{computeRunId}/manifest:
    get:
      operationId: getCompletedManifest
      parameters:
        - $ref: '#/components/parameters/ComputeRunId'
      responses:
        '200':
          description: Manifest; accept artifacts only when status is completed
          content:
            application/json: { schema: { $ref: '#/components/schemas/Manifest' } }
        '401': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /compute/v1/artifacts:
    get:
      operationId: streamArtifact
      parameters:
        - name: artifactId
          in: query
          required: true
          schema: { type: string, minLength: 1, maxLength: 512 }
      responses:
        '200':
          description: Private artifact bytes
          content:
            application/octet-stream: { schema: { type: string, format: binary } }
        '206':
          description: Optional single-range response
          content:
            application/octet-stream: { schema: { type: string, format: binary } }
        '401': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    ComputeServiceKey:
      type: http
      scheme: bearer
      bearerFormat: opaque-service-key
  parameters:
    ComputeRunId:
      name: computeRunId
      in: path
      required: true
      schema: { type: string, minLength: 1, maxLength: 128 }
  schemas:
    ComputeEnvelope:
      type: object
      additionalProperties: false
      required: [schemaVersion, kind, payload]
      properties:
        schemaVersion: { type: integer, const: 1 }
        kind: { type: string, minLength: 1, maxLength: 80 }
        payload: { type: object }
    PreviewRequest:
      allOf:
        - $ref: '#/components/schemas/ComputeEnvelope'
        - type: object
          properties:
            kind: { const: map_image }
    CreateRunRequest:
      allOf:
        - $ref: '#/components/schemas/ComputeEnvelope'
        - type: object
          required: [idempotencyKey]
          properties:
            idempotencyKey:
              type: string
              minLength: 1
              maxLength: 200
              description: Stable platform-job UUID key; same kind/payload returns same run.
    RunEnvelope:
      type: object
      required: [schemaVersion, data]
      properties:
        schemaVersion: { type: integer, const: 1 }
        data:
          type: object
          required: [computeRunId, status]
          properties:
            computeRunId: { type: string }
            kind: { type: string }
            status: { type: string, enum: [queued, running, completed, failed, cancelled] }
            progress: { type: object, additionalProperties: true }
            artifacts:
              type: array
              items: { $ref: '#/components/schemas/ArtifactSummary' }
    Manifest:
      type: object
      required: [schemaVersion, computeRunId, status, artifacts]
      properties:
        schemaVersion: { type: integer, const: 1 }
        computeRunId: { type: string }
        rendererVersion: { type: string }
        status: { type: string, enum: [queued, running, completed, failed, cancelled] }
        artifacts:
          type: array
          items: { $ref: '#/components/schemas/ArtifactSummary' }
    ArtifactSummary:
      type: object
      required: [artifactId, mediaType, sizeBytes]
      properties:
        artifactId: { type: string }
        name: { type: string }
        kind: { type: string }
        mediaType: { type: string }
        sizeBytes: { type: integer, minimum: 1, maximum: 524288000 }
        sha256: { type: string, pattern: '^[0-9a-f]{64}$' }
    Problem:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details]
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object }
  responses:
    Problem:
      description: Stable Compute error envelope
      content:
        application/json: { schema: { $ref: '#/components/schemas/Problem' } }
