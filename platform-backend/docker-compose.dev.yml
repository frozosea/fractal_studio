name: fractal-platform-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fractal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fractal_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-fractal_platform}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_dev_password}
    ports:
      - "${MINIO_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_dev_password}
      S3_BUCKET: ${S3_BUCKET:-fractal-platform}
    entrypoint: >-
      /bin/sh -ec '
      until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 2; done;
      mc mb --ignore-existing "local/$$S3_BUCKET";
      '

  migrate:
    build:
      context: .
    command: ["/bin/sh", "scripts/dev-migrate-watch.sh"]
    environment: &platform_env
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://fractal:fractal_dev_password@postgres:5432/fractal_platform}
      MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:-postgresql+psycopg://fractal:fractal_dev_password@postgres:5432/fractal_platform}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:-http://localhost:19000}
      S3_BUCKET: ${S3_BUCKET:-fractal-platform}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minio}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minio_dev_password}
      COMPUTE_BASE_URL: ${COMPUTE_BASE_URL:-http://host.docker.internal:8080}
      COMPUTE_SERVICE_KEY: ${COMPUTE_SERVICE_KEY:-dev-compute-key-change-me}
      COMPUTE_CONNECT_TIMEOUT_SECONDS: ${COMPUTE_CONNECT_TIMEOUT_SECONDS:-5}
      COMPUTE_READ_TIMEOUT_SECONDS: ${COMPUTE_READ_TIMEOUT_SECONDS:-60}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-me-32-bytes-minimum}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_SELLER_ID: ${ALIPAY_SELLER_ID:-}
      ALIPAY_PRIVATE_KEY_PATH: ${ALIPAY_PRIVATE_KEY_PATH:-}
      ALIPAY_PUBLIC_KEY_PATH: ${ALIPAY_PUBLIC_KEY_PATH:-}
      ALIPAY_NOTIFY_URL: ${ALIPAY_NOTIFY_URL:-}
      ALIPAY_RETURN_URL: ${ALIPAY_RETURN_URL:-}
      OUTBOX_POLL_INTERVAL_SECONDS: ${OUTBOX_POLL_INTERVAL_SECONDS:-1}
      OUTBOX_LEASE_SECONDS: ${OUTBOX_LEASE_SECONDS:-30}
      OUTBOX_MAX_ATTEMPTS: ${OUTBOX_MAX_ATTEMPTS:-10}
      OUTBOX_CLAIM_BATCH_SIZE: ${OUTBOX_CLAIM_BATCH_SIZE:-20}
      OUTBOX_SCHEDULE_INTERVAL_SECONDS: ${OUTBOX_SCHEDULE_INTERVAL_SECONDS:-30}
      OUTBOX_BACKOFF_BASE_SECONDS: ${OUTBOX_BACKOFF_BASE_SECONDS:-2}
      OUTBOX_BACKOFF_MAX_SECONDS: ${OUTBOX_BACKOFF_MAX_SECONDS:-300}
      RENDER_POLL_INTERVAL_SECONDS: ${RENDER_POLL_INTERVAL_SECONDS:-3}
      RENDER_QUOTA_MAX_ACTIVE: ${RENDER_QUOTA_MAX_ACTIVE:-3}
      MASTER_DOWNLOAD_TTL_SECONDS: ${MASTER_DOWNLOAD_TTL_SECONDS:-300}
      PAYOUT_QR_TTL_SECONDS: ${PAYOUT_QR_TTL_SECONDS:-600}
      PREVIEW_MAX_PIXELS: ${PREVIEW_MAX_PIXELS:-1048576}
      PREVIEW_MAX_WIDTH: ${PREVIEW_MAX_WIDTH:-1024}
      PREVIEW_MAX_HEIGHT: ${PREVIEW_MAX_HEIGHT:-1024}
      PREVIEW_RATE_LIMIT_PER_MINUTE: ${PREVIEW_RATE_LIMIT_PER_MINUTE:-30}
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/migrations-ready"]
      interval: 2s
      timeout: 2s
      retries: 30

  api:
    build:
      context: .
    command:
      ["uv", "run", "--no-sync", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "app"]
    environment: *platform_env
    ports:
      - "${API_PORT:-18000}:8000"
    volumes:
      - .:/app
      - /app/.venv
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
    command:
      ["uv", "run", "--no-sync", "watchfiles", "--filter", "python", "uv run --no-sync python -m app.outbox.worker", "app"]
    environment: *platform_env
    volumes:
      - .:/app
      - /app/.venv
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    stop_grace_period: 15s

volumes:
  postgres_data:
  redis_data:
  minio_data:
